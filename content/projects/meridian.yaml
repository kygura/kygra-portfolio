accent: "#4cb862"
title: Meridian
subtitle: A cartographic interface
summary: >-
  A globe-scale map interface for comparing and visualizing global metrics and generating city intelligence briefs
description: >-
  Global metrics as overlays on a 3D MapLibre globe — compare cities at a
  glance. An OpenAI-powered agent generates city intelligence briefs and
  builds multi-city itineraries from a chat interface.
overview:
  - >-
    Each metric is a surface layer on the globe. MapLibre GL JS handles
    cartographic rendering, deck.gl composes data overlays, and a Hono
    backend serves normalized metric surfaces. Geographic context and metric
    distribution in one view instead of static comparison tables.
  - >-
    The atlas is the primary interface. A chat agent generates city briefs,
    compares regions, and builds itineraries. Zustand keeps the globe,
    overlays, and chat state in sync across a session.
repo: https://github.com/kygura/meridian
live: https://meridian.onrender.com
techStack:
  - MapLibre GL JS
  - deck.gl
  - Hono
  - OpenAI
  - Zustand
layout: wide
status: In development
year: "2026"
